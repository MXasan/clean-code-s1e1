<html>

<head>
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="header-img">
        <img src="./eisenhower-matrix.jpg" alt="Eisenhower Matrix">
        <a class="more_inf" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </div>
    <div class="centered-main-page-element">
        <div id="task-input">
            <label for="new-task">Add Item</label>
            <div class="task-row-wrapper">
                <input id="new-task" type="text">
                <button>Add</button>
            </div>
        </div>
        <h3>Todo</h3>
        <ul id='incompleteTasks'>
            <li>
                <input id="input" type='checkbox'>
                <label for="input" class="task">Pay Bills</label>
                <input id="input" type="text" class="task">
                <button class="edit">Edit</button>
                <button class="delete">
                    <img src="./remove.svg" alt="Delete">
                </button>
            </li>
            <li class="editMode">
                <input type="checkbox">
                <label class="task">Go Shopping</label>
                <input type="text" value="Go Shopping" class="task">
                <button class='edit'>Save</button>
                <button class="delete"><img src="./remove.svg" alt="Delete"></button>
            </li>
        </ul>
        <h3>Completed</h3>
        <ul id="completed-tasks">
            <li>
                <input type="checkbox" checked>
                <label class="task">See the Doctor</label>
                <input type="text" class="task">
                <button class="edit">Edit</button>
                <button class="delete">
                    <img src="./remove.svg" alt="Delete">
                </button>
            </li>
        </ul>
    </div>
    <script type="text/javascript" SRC="app.js"></script>
</body>

</html>
